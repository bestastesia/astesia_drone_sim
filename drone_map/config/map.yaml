# map.yaml — 6 障碍物，挡住 (0,0)→(2,1) 直行但留出绕行通道
# inflate=0.6 → 每个障碍物中心距目标 > (radius+0.6)
drone_map:
  ros__parameters:
    procedural: false
    seed: 42
    num_obstacles: 12
    num_spheres: 3
    num_cylinders: 3
    num_cubes: 2
    frame_id: "map"
    obstacles:
      - "sphere 0.7 0.3 1.5 0.35"
      - "sphere 1.0 0.5 1.5 0.35"
      - "sphere 1.3 0.5 1.5 0.2"
      - "cylinder 0.5 0.7 1.0 0.25 2.0"
      - "cube 0.8 -0.2 1.5 0.2 0.2 0.3"
      - "sphere 0.4 0.0 1.5 0.3"
# =============================================================================
# 验收场景 5 专用：狭窄通道绕行
# 用法：取消下面所有注释，设 procedural: false
# 效果：两排 r=0.15 柱体墙形成 0.8m 宽通道。
#       从 (0,0) 到 (3,2.5) 的对角线直接穿过左下封闭区，
#       无人机必须先从出口出去再绕进通道，路径明显弯曲。
# =============================================================================
      # --- 左下封闭区（远离起点(0,0)，最近障碍物距起点 > 0.8m） ---
      - "sphere 1.2 1.0 1.5 0.35"
      - "sphere 1.8 1.3 1.5 0.30"
      # --- 下墙：y≈0.2，x 从 0.5 开始，留出 0.5m 起点间隙 ---
      - "cylinder 0.5  0.2 1.0 0.15 2.5"
      - "cylinder 1.2  0.2 1.0 0.15 2.5"
      - "cylinder 1.9  0.2 1.0 0.15 2.5"
      - "cylinder 2.6  0.2 1.0 0.15 2.5"
      - "cylinder 3.3  0.2 1.0 0.15 2.5"
      # --- 上墙：y≈2.3，对称偏移 ---
      - "cylinder 0.5  2.3 1.0 0.15 2.5"
      - "cylinder 1.2  2.3 1.0 0.15 2.5"
      - "cylinder 1.9  2.3 1.0 0.15 2.5"
      - "cylinder 2.6  2.3 1.0 0.15 2.5"
      - "cylinder 3.3  2.3 1.0 0.15 2.5"
      # --- 起点附近留空，挡墙在前面 ---
      - "sphere 1.2 -0.8 1.5 0.35"
      - "sphere 0.8 -0.5 1.5 0.30"