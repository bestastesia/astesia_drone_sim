# map.yaml — 显式障碍物列表（完全可复现，demo 用）
# 障碍物格式：字符串 "shape cx cy cz [radius|rx] [height|ry rz]"
# 置于起点(0,0,1.5) 到各航点之间的直线上，迫使绕行
drone_map:
  ros__parameters:
    procedural: false
    seed: 42
    frame_id: "map"
    obstacles:
      # 球 (0.8, -0.3, 1.5) r=0.35  — 挡 (0,0)→(2,0) 直行路线
      - "sphere 0.8 -0.3 1.5 0.35"
      # 柱 (1.8, 0.6, 1.0) r=0.3 h=2.0 — 挡 (0,0)→(2,0) 后半段
      - "cylinder 1.8 0.6 1.0 0.3 2.0"
      # 立方体 (2.0, 1.0, 1.5) 半长 0.3 — 挡 (2,0)→(2,2) 角点正前方
      - "cube 2.0 1.0 1.5 0.3 0.3 0.6"
      # 球 (1.1, 2.0, 1.5) r=0.35 — 挡 (2,2)→(0,2) 直行
      - "sphere 1.1 2.0 1.5 0.35"
      # 柱 (0.0, 1.0, 1.0) r=0.25 h=2.0 — 挡 (0,2)→(0,0) 直行
      - "cylinder 0.0 1.0 1.0 0.25 2.0"
      # 中心大球 (0.9, 0.8, 1.5) r=0.4 — 制造"狭窄通道"效果
      - "sphere 0.9 0.8 1.5 0.4"