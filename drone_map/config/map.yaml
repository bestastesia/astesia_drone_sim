# map.yaml — 6 障碍物，挡住 (0,0)→(2,1) 直行但留出绕行通道
# inflate=0.6 → 每个障碍物中心距目标 > (radius+0.6)
drone_map:
  ros__parameters:
    procedural: true
    seed: 42
    num_obstacles: 12
    # 形状数量分配（-1 = 不限，按 num_obstacles 随机分配）
    num_spheres: 3
    num_cylinders: 3
    num_cubes: 2
    frame_id: "map"
    obstacles:
      # (0.7, 0.3) r=0.35 → 距目标 1.48 > 0.95 ✓，挡直线 (0.7, 0.35) 处
      - "sphere 0.7 0.3 1.5 0.9"
      # (1.0, 0.5) r=0.35 → 距目标 1.12 > 0.95 ✓，挡直线 (1.0, 0.5) 处
      - "sphere 1.0 0.5 1.5 0.35"
      # (1.3, 0.65) r=0.3 → 距目标 0.78 > 0.9？→ 0.78 < 0.9 ✗：调小 r=0.2 → infl=0.8, 距离 0.78 < 0.8 仍近 → 移到 (1.3, 0.5) 距 0.86 > 0.8 ✓
      - "sphere 1.3 0.5 1.5 0.2"
      # 圆柱 (0.5, 0.7, 1.0) r=0.25 h=2.0 — 上方扰流
      - "cylinder 0.5 0.7 1.0 0.25 2.0"
      # 立方 (0.8, -0.2, 1.5) 半长0.2 — 下方扰流，距目标 1.7 > 0.8 ✓
      - "cube 0.8 -0.2 1.5 0.2 0.2 0.3"
      # 球 (0.4, 0.0, 1.5) r=0.3 — 起点附近，距目标 1.84 > 0.9 ✓
      - "sphere 0.4 0.0 1.5 0.3"

# =============================================================================
# 验收场景 5 专用：狭窄通道绕行
# 用法：取消下面所有注释，设 procedural: false
# 效果：两排 r=0.15 柱体墙形成 0.8m 宽通道。
#       从 (0,0) 到 (3,2.5) 的对角线直接穿过左下封闭区，
#       无人机必须先从出口出去再绕进通道，路径明显弯曲。
# =============================================================================
#      # --- 左下封闭区（起点 (0,0) 在墙内，强迫从上方出口出去） ---
#      - "sphere 0.8 1.3 1.5 0.35"
#      - "sphere 1.5 1.5 1.5 0.30"
#      # --- 下墙：y≈-0.2，沿线排柱，挡住走下方 ---
#      - "cylinder 0.0 -0.2 1.0 0.15 2.5"
#      - "cylinder 0.7 -0.2 1.0 0.15 2.5"
#      - "cylinder 1.4 -0.2 1.0 0.15 2.5"
#      - "cylinder 2.1 -0.2 1.0 0.15 2.5"
#      - "cylinder 2.8 -0.2 1.0 0.15 2.5"
#      # --- 上墙：y≈2.1，沿线排柱，挡住走上方 ---
#      - "cylinder 0.0  2.1 1.0 0.15 2.5"
#      - "cylinder 0.7  2.1 1.0 0.15 2.5"
#      - "cylinder 1.4  2.1 1.0 0.15 2.5"
#      - "cylinder 2.1  2.1 1.0 0.15 2.5"
#      - "cylinder 2.8  2.1 1.0 0.15 2.5"
#      # --- 起点上方堵球，防止直线冲出去 ---
#      - "sphere 0.5 -0.8 1.5 0.35"
#      - "sphere 1.2 -0.6 1.5 0.30"