# map.yaml — 6 障碍物，挡住 (0,0)→(2,1) 直行但留出绕行通道
# inflate=0.6 → 每个障碍物中心距目标 > (radius+0.6)
drone_map:
  ros__parameters:
    procedural: true
    seed: 42
    frame_id: "map"
    obstacles:
      # (0.7, 0.3) r=0.35 → 距目标 1.48 > 0.95 ✓，挡直线 (0.7, 0.35) 处
      - "sphere 0.7 0.3 1.5 0.9"
      # (1.0, 0.5) r=0.35 → 距目标 1.12 > 0.95 ✓，挡直线 (1.0, 0.5) 处
      - "sphere 1.0 0.5 1.5 0.35"
      # (1.3, 0.65) r=0.3 → 距目标 0.78 > 0.9？→ 0.78 < 0.9 ✗：调小 r=0.2 → infl=0.8, 距离 0.78 < 0.8 仍近 → 移到 (1.3, 0.5) 距 0.86 > 0.8 ✓
      - "sphere 1.3 0.5 1.5 0.2"
      # 圆柱 (0.5, 0.7, 1.0) r=0.25 h=2.0 — 上方扰流
      - "cylinder 0.5 0.7 1.0 0.25 2.0"
      # 立方 (0.8, -0.2, 1.5) 半长0.2 — 下方扰流，距目标 1.7 > 0.8 ✓
      - "cube 0.8 -0.2 1.5 0.2 0.2 0.3"
      # 球 (0.4, 0.0, 1.5) r=0.3 — 起点附近，距目标 1.84 > 0.9 ✓
      - "sphere 0.4 0.0 1.5 0.3"