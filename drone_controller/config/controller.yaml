# drone_controller 默认参数 (SI)
drone_controller:
  ros__parameters:
    mass: 1.0
    arm_length: 0.2
    k_F: 1.0
    k_M: 0.05
    Kp_pos: [2.0, 2.0, 3.0]
    Kd_pos: [2.0, 2.0, 2.4]
    Ki_pos: [0.0, 0.0, 0.0]
    Ki_max: 1.0
    a_xy_max: 4.0
    a_z_min: -3.0
    a_z_max: 6.0
    a_max_vec: 8.0
    d_far: 10.0
    Kp_att: [8.0, 8.0, 3.0]
    Kd_rate: [0.8, 0.8, 0.7]
    # LADRC 参数（control_mode: "ladrc" 时生效，实验性功能）
    control_mode: "pd"         # "pd"（推荐，稳定） | "ladrc"（实验性）
    ladrc_b0: [1.0, 1.0, 1.0] # 各轴输入增益 b0 [x,y,z]
    ladrc_wc: [1.5, 1.5, 2.0] # 控制器带宽（保守值，避免振荡）
    ladrc_wo: [6.0, 6.0, 10.0] # 观测器带宽（4× wc）
    F_min: 0.0
    F_max: 39.24
    tau_max: 5.0
    omega_max: 1000.0
    rpm_min: 0.0
    rpm_max: 10000.0
    ctrl_dt: 0.005