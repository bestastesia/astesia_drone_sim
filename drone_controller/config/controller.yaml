# controller.yaml — PD 参数
# ===========================================================================
# 理论推导（串级系统极点配置）
#
# 内环（姿态）：I·s² + Kd_rate·s + Kp_att = 0
#   ω_n_att = sqrt(Kp_att/I)
#   ζ_att   = Kd_rate / (2·sqrt(Kp_att·I))
#   roll/pitch: I=0.02, Kp_att=8 → ω_n=20 rad/s
#   Kd_rate=0.8 → ζ=1（临界阻尼，时间常数 0.05s）
#   yaw: I=0.04, Kp_att=3 → ω_n=8.7 rad/s, Kd_rate=0.7 → ζ=1
#
# 外环（位置）：内环近似一阶，ω_att/3 ≈ 6.7 rad/s 可用带宽
#   但实际瓶颈是加速度限幅 a_max：
#     Kp_max = a_max / 飞行距离
#     Kp_xy ≤ 4/2 = 2.0    (a_xy_max=4, 覆盖 2m)
#     Kp_z  ≤ 6/2 = 3.0    (a_z_max=6,  覆盖 2m)
#     Kd = 2ζ·sqrt(Kp)     (ζ ≈ 0.7 用于位置环)
# ===========================================================================
drone_controller:
  ros__parameters:
    mass: 1.0
    arm_length: 0.2
    k_F: 1.0
    k_M: 0.05
    Kp_pos: [2.0, 2.0, 3.0]
    Kd_pos: [2.0, 2.0, 2.4]
    Ki_pos: [0.0, 0.0, 0.0]
    Ki_max: 1.0
    a_xy_max: 4.0
    a_z_min: -3.0
    a_z_max: 6.0
    a_max_vec: 8.0
    d_far: 10.0
    Kp_att: [8.0, 8.0, 3.0]
    Kd_rate: [0.8, 0.8, 0.7]
    # LADRC 参数（control_mode: "ladrc" 时生效，实验性功能）
    control_mode: "pd"         # "pd"（推荐，稳定） | "ladrc"（实验性）
    ladrc_b0: [1.0, 1.0, 1.0] # 各轴输入增益 b0 [x,y,z]
    ladrc_wc: [1.5, 1.5, 2.0] # 控制器带宽（保守值，避免振荡）
    ladrc_wo: [6.0, 6.0, 10.0] # 观测器带宽（4× wc）
    F_min: 0.0
    F_max: 39.24
    tau_max: 5.0
    omega_max: 1000.0
    rpm_min: 0.0
    rpm_max: 10000.0
    ctrl_dt: 0.005