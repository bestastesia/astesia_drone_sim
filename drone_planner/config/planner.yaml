# planner.yaml — 四模式感知/规划参数
drone_planner:
  ros__parameters:
    resolution: 0.1          # 栅格分辨率 m
    bounds: [-3.0, 5.0, -3.0, 5.0]  # x0 x1 y0 y1
    safety_distance: 0.4     # 障碍物最小距离 m
    drone_radius: 0.2        # 无人机外接圆 m（膨胀 = safety + drone_radius）
    use_goal_z: true
    cruise_altitude: 1.5
    replan_rate: 1.0         # Hz
    lookahead: 0.5           # 前视距离 m
    advance_tol: 0.15        # 到达容差 m
    grid_frame: "map"
    # 感知参数 (ros2 param set 热切换)
    perception_mode: "global"    # "global" | "fov"
    planner_dim: "2d"           # "2d" | "3d"
    fov_h_deg: 60.0             # 水平视场角 (°)
    fov_v_deg: 45.0             # 垂直视场角 (°)
    fov_range: 5.0              # 感知距离 m
    voxel_resolution: 0.2       # 体素分辨率 m
    z_bounds: [0.0, 4.0]        # 体素 z 范围 [z_min, z_max]
