# drone_dynamics 默认参数 (SI)
drone_dynamics:
  ros__parameters:
    mass: 1.0
    inertia: [0.02, 0.02, 0.04]
    k_F: 1.0
    k_M: 0.05
    arm_length: 0.2
    motor_tau: 0.02
    omega_min: 0.0
    omega_max: 1000.0
    sim_dt: 0.001
    add_linear_drag: false
    drag_coeff: 0.1
    init_pose: [0.0, 0.0, 0.0, 0.0]
    frame_id: "map"
    # 风扰 — runtime hot-swap via ros2 param set
    wind_enabled: false
    wind_force: [0.0, 0.0, 0.0]   # 恒定风力 (世界系, N) [Fx, Fy, Fz]
    wind_gust_amplitude: 0.0        # 阵风幅值 (N), 0 = 无阵风
    wind_gust_period: 2.0           # 阵风周期 (s)
