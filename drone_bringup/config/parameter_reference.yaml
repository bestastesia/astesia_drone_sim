# Unified Parameter Reference — 所有可配参数一览
#
# 编辑任何 YAML 后，重启 launch 即生效（部分参数支持 ros2 param set 热更新，标注了 🔥）。
# 参数一致性校验：controller <-> dynamics 的 mass/k_F/k_M/arm_length 必须一致，由 launch
# 预检（controller_node 中加载 dynamics.yaml 并交叉比对）。

# ============================================================================
# drone_dynamics — 动力学参数
# ============================================================================
# 文件: drone_dynamics/config/dynamics.yaml
#
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | mass          | double      | 1.0                     | (0, ∞)         | 总质量 kg                         | 🔥     |
# | inertia       | double[3]   | [0.02, 0.02, 0.04]     | 每个 > 0       | Ixx Iyy Izz kg·m²                 | 🔥     |
# | k_F           | double      | 1.0                     | (0, ∞)         | 推力系数 N·s²/rad²               | 🔥     |
# | k_M           | double      | 0.05                    | (0, ∞)         | 反扭矩系数 N·m·s²/rad²            | 🔥     |
# | arm_length    | double      | 0.2                     | (0, ∞)         | 臂长 m                            | 🔥     |
# | motor_tau     | double      | 0.02                    | (0.001, 0.1)   | 电机时间常数 s                    | 🔥     |
# | omega_min     | double      | 0.0                     | [0, omega_max) | 最小转速 rad/s                    | 🔥     |
# | omega_max     | double      | 1000.0                  | (0, ∞)         | 最大转速 rad/s                    | 🔥     |
# | sim_dt        | double      | 0.001                   | (0.0001, 0.01) | 仿真步长 s                        |        |
# | add_linear_drag | bool      | false                   | {true,false}   | 是否加线性空气阻力                | 🔥     |
# | drag_coeff    | double      | 0.1                     | [0, 1]         | 阻力系数                           | 🔥     |
# | init_pose     | double[4]   | [0, 0, 0, 0]            | —              | [x y z yaw] 初始位姿              |        |
# | frame_id      | string      | "map"                   | —              | 坐标系                            |        |

# ============================================================================
# drone_controller — 控制器参数 (PD 模式)
# ============================================================================
# 文件: drone_controller/config/controller.yaml
#
# 物理参数 (必须与 dynamics 一致):
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | mass          | double      | 1.0                     | (0, ∞)         | 与 dynamics 一致                  | 🔥     |
# | k_F           | double      | 1.0                     | (0, ∞)         | 与 dynamics 一致                  | 🔥     |
# | k_M           | double      | 0.05                    | (0, ∞)         | 与 dynamics 一致                  | 🔥     |
# | arm_length    | double      | 0.2                     | (0, ∞)         | 与 dynamics 一致                  | 🔥     |
#
# 位置环:
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | Kp_pos        | double[3]   | [2.0, 2.0, 3.0]        | (0, 10] ×3     | 位置比例增益 [x,y,z]              | 🔥     |
# | Kd_pos        | double[3]   | [2.0, 2.0, 2.4]        | [0, 6] ×3      | 位置微分增益 [x,y,z]              | 🔥     |
# | Ki_pos        | double[3]   | [0.0, 0.0, 0.0]        | [0, 2] ×3      | 位置积分增益 (v1=无积分)         | 🔥     |
# | Ki_max        | double      | 1.0                     | (0, ∞)         | 积分项上限                         | 🔥     |
#
# 加速度限幅:
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | a_xy_max      | double      | 4.0                     | (0, 15]        | 水平加速度上限 m/s²              | 🔥     |
# | a_z_min       | double      | -3.0                    | [-10, 0)       | 下降加速度上限 (负值)            | 🔥     |
# | a_z_max       | double      | 6.0                     | (0, 15]        | 上升加速度上限 m/s²              | 🔥     |
# | a_max_vec     | double      | 8.0                     | (0, 20]        | 三维加速度向量上限               | 🔥     |
# | d_far         | double      | 10.0                    | (0, ∞)         | 远距离时加速度降额起点 m          | 🔥     |
#
# 姿态环:
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | Kp_att        | double[3]   | [8.0, 8.0, 3.0]        | (0, 40] ×3     | 姿态比例增益 [r,p,y]              | 🔥     |
# | Kd_rate       | double[3]   | [0.8, 0.8, 0.7]        | (0, 6] ×3      | 角速度微分增益 [r,p,y]            | 🔥     |
#
# 饱和/LADRC:
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | F_min         | double      | 0.0                     | [0, F_max)     | 最小总推力 N                      | 🔥     |
# | F_max         | double      | 39.24                   | (0, ∞)         | 最大总推力 N (=4·kF·ωmax²)       | 🔥     |
# | tau_max       | double      | 5.0                     | (0, ∞)         | 各轴力矩限幅 N·m                  | 🔥     |
# | omega_max     | double      | 1000.0                  | —              | 电机转速上限 rad/s                | 🔥     |
# | rpm_min       | double      | 0.0                     | [0, rpm_max)   | RPM 下限                          | 🔥     |
# | rpm_max       | double      | 10000.0                 | (0, ∞)         | RPM 上限                          | 🔥     |
# | ctrl_dt       | double      | 0.005                   | (0.001, 0.02]  | 控制步长 s (200Hz)                |        |
# | control_mode  | string      | "pd"                    | {"pd","ladrc"} | 控制模式                          | 🔥     |
# | ladrc_b0      | double[3]   | [1.0, 1.0, 1.0]        | (0, ∞) ×3      | LADRC 输入增益 (实验性)           | 🔥     |
# | ladrc_wc      | double[3]   | [1.5, 1.5, 2.0]        | (0, 20] ×3     | LADRC 控制器带宽 (实验性)         | 🔥     |
# | ladrc_wo      | double[3]   | [6.0, 6.0, 10.0]       | (0, 50] ×3     | LADRC 观测器带宽 (实验性)         | 🔥     |
#
# ============================================================================
# drone_map — 地图参数
# ============================================================================
# 文件: drone_map/config/map.yaml
#
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | procedural    | bool        | false                   | {true,false}   | true=随机生成, false=显式列表     | 🔥     |
# | seed          | int         | 42                      | —              | 随机种子                          | 🔥     |
# | num_obstacles | int         | 12                      | [1, 50]        | 随机生成数量                      | 🔥     |
# | bounds        | double[6]   | [-2,4,-2,4,0,5]         | —              | [x0,x1,y0,y1,z0,z1] 生成区域      | 🔥     |
# | clear_radius  | double      | 0.8                     | (0, ∞)         | 起点/终点周围无障碍的半径         | 🔥     |
# | size_min/max  | double      | 0.2 / 0.5               | (0, 2]         | 障碍物尺寸范围                    | 🔥     |
# | obstacles     | string[]    | (显式列表)              | —              | "shape cx cy cz r [h]" 行列表     | 🔥     |
#
# ============================================================================
# drone_planner — 规划器参数
# ============================================================================
# 文件: drone_planner/config/planner.yaml
#
# | 参数          | 类型        | 默认值                  | 范围           | 说明                              | 热更新 |
# |---------------|-------------|-------------------------|----------------|-----------------------------------|--------|
# | resolution    | double      | 0.1                     | (0.02, 0.5]    | 栅格分辨率 m                     |        |
# | bounds        | double[4]   | [-3,5,-3,5]             | —              | [x0,x1,y0,y1] 地图范围            |        |
# | safety_distance | double    | 0.4                     | [0.1, 5]       | 障碍物安全距离 m                  |        |
# | drone_radius  | double      | 0.2                     | (0, ∞)         | 无人机外接圆半径 m                |        |
# | inflate       | —           | 0.6 (=safety+drone_r)   | —              | 总膨胀半径 (只读计算值)            |        |
# | cruise_altitude | double    | 1.5                     | (0, 4]         | 默认巡航高度 m                    | 🔥     |
# | use_goal_z    | bool        | true                    | {true,false}   | true=按目标 z 规划, false=巡航高度 | 🔥     |
# | replan_rate   | double      | 1.0                     | [0.2, 10]      | 重规划频率 Hz                     | 🔥     |
# | lookahead     | double      | 0.5                     | (0, 3]         | 前视距离 m                        | 🔥     |
# | advance_tol   | double      | 0.15                    | (0.01, 1]      | 到达航点阈值 m                    | 🔥     |
# | grid_frame    | string      | "map"                   | —              | 栅格坐标系                        |        |

# ============================================================================
# 跨节点一致性校验
# ============================================================================
#
# 以下参数在 controller 和 dynamics 中必须一致。controller_node 启动时会从 dynamics.yaml
# 加载这些参数并交叉校验。不匹配时打印 ERROR 但继续运行（软警告）。
#
#   | 参数         | controller | dynamics   | 不一致后果                |
#   |--------------|------------|------------|---------------------------|
#   | mass         | ✅         | ✅         | 推力计算错误 → overshoot |
#   | k_F          | ✅         | ✅         | mixer 逆算错 → 分配错误  |
#   | k_M          | ✅         | ✅         | yaw 扭矩算错             |
#   | arm_length   | ✅         | ✅         | mixer 矩阵错 → 翻车      |
